name: Build

on:
  push:
    paths:
      - ".github/workflows/build.yml"
      - "main/**"
      - "backport-1.21.1/**"
      - "backport-1.21.11/**"
  pull_request:
    paths:
      - ".github/workflows/build.yml"
      - "main/**"
      - "backport-1.21.1/**"
      - "backport-1.21.11/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-wrapper:
    name: Validate Gradle Wrappers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate wrappers
        uses: gradle/actions/wrapper-validation@v4

  build:
    name: Build ${{ matrix.project.name }}
    runs-on: ubuntu-latest
    needs: validate-wrapper
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: main
            dir: main
            java: "25"
          - name: backport-1.21.1
            dir: backport-1.21.1
            java: "21"
          - name: backport-1.21.11
            dir: backport-1.21.11
            java: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.project.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.project.java }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x "${{ matrix.project.dir }}/gradlew"

      - name: Build
        working-directory: ${{ matrix.project.dir }}
        run: ./gradlew --no-daemon build

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}-artifacts
          if-no-files-found: error
          path: |
            ${{ matrix.project.dir }}/fabric/build/libs/*.jar
            ${{ matrix.project.dir }}/paper/build/libs/*.jar
            !${{ matrix.project.dir }}/fabric/build/libs/*-sources.jar
            !${{ matrix.project.dir }}/paper/build/libs/*-sources.jar
